{% extends 'library/base.html' %}
{% load static %}

{% block content %}
<section class="signup-container">
    <h2>Sign Up</h2>

    {% if form.errors %} {% for field in form %} {% for error in field.errors %}
    <p style="color:red;">{{ error }}</p>
    {% endfor %} {% endfor %} {% endif %}

    <form method="POST">
        {% csrf_token %}
        <label>Username:</label>
        <input type="text" name="username" value="{{ form.username.value|default:'' }}" required>

        <label>Email:</label>
        <input type="email" name="email" value="{{ form.email.value|default:'' }}" required>

        <label>Password:</label>
        <input type="password" name="password1" required>

        <label>Confirm Password:</label>
        <input type="password" name="password2" required>

        <div class="radio-group">
            <p>Account Type:</p>
            <input type="radio" name="role" value="member"
                {% if request.POST.role == 'member' %}checked{% endif %}> Member
            <input type="radio" name="role" value="admin"
                {% if request.POST.role == 'admin' %}checked{% endif %}> Admin
        </div>
        <input type="submit" value="Sign Up">
    </form>
</section>
{% endblock %}
