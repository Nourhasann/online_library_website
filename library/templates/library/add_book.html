{% extends 'library/base.html' %}
{% load static %}

{% block content %}
<a href="{% url 'book_list' %}" class="back-button">Back</a>
<h1 align="center" style="margin-top:40px;">Enter Book Information</h1>

<fieldset>
    <form method="POST">
        {% csrf_token %}
        {% if form.errors %}
            {% for field in form %}
                {% for error in field.errors %}
                    <p style="color:red;">{{ error }}</p>
                {% endfor %}
            {% endfor %}
        {% endif %}
        <div class="form-row">
            <div class="form-column">
                <label>Book Title</label>
                <input type="text" name="title" value="{{ form.title.value|default:'' }}" required>
            </div>
            <div class="form-column">
                <label>Author</label>
                <input type="text" name="author" value="{{ form.author.value|default:'' }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-column">
    <label>Category</label>
    <input type="text" name="category" value="{{ form.category.value|default:'' }}" placeholder="e.g. Programming, AI...">
</div>

            <div class="form-column">
                <label>Cover Image filename</label>
                <input type="text" name="cover_image" value="{{ form.cover_image.value|default:'' }}" placeholder="e.g. AI Basics.jpg">
            </div>
        </div>
        <div>
            <label>Description</label><br>
            <textarea name="description" rows="4" cols="30">{{ form.description.value|default:'' }}</textarea>
        </div>
        <br>
        <input type="submit" value="ADD BOOK">
        <input type="reset" value="RESET">
    </form>
</fieldset>
{% endblock %}
